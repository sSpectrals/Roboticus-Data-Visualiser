app-id: com.roboticus.DataVisualiser
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: appRoboticus_Data_Visualiser

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --device=all

cleanup:
  - /lib/*.la
  - /lib/cmake
  - /lib/pkgconfig
  - /share/man
  - '*.a'

modules:
  - name: qt6-graphs
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DQT_BUILD_EXAMPLES=OFF
      - -DQT_BUILD_TESTS=OFF
      - -DQT_NO_PACKAGE_VERSION_CHECK=TRUE
      - -DCMAKE_SKIP_INSTALL_RPATH=OFF
      - -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON
      - -DCMAKE_INSTALL_RPATH=/app/lib/x86_64-linux-gnu
      - -DCMAKE_INSTALL_RPATH_USE_LINK_PATH=ON
    sources:
      - type: archive
        url: https://download.qt.io/official_releases/qt/6.10/6.10.2/submodules/qtgraphs-everywhere-src-6.10.2.tar.xz
        sha256: f690fc6aa567d89a6e76ce370d684beb243dc0c2ed1187dd305433e278dd7aaf

  - name: Roboticus-Data-Visualiser
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DCMAKE_PREFIX_PATH=/app
      - -DCMAKE_FIND_ROOT_PATH=/app
      - -DCMAKE_INSTALL_RPATH=/app/lib/x86_64-linux-gnu
      - -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON
      - -DQT_NO_PACKAGE_VERSION_CHECK=TRUE
    sources:
      - type: dir
        path: .
